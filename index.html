<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Elegant Bags</title>
    <style>
        :root { --gold: #d4af37; --black: #111; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f9f9f9; color: var(--black); }
        
        /* Navbar */
        nav { background: var(--black); padding: 15px 5%; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }
        .nav-logo { color: var(--gold); font-size: 1.8rem; font-weight: bold; letter-spacing: 4px; text-decoration: none; }

        /* الوجهة (Hero Section) - رجعت تاني */
        .hero { 
            height: 65vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hero.jpg'); 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: var(--gold); 
            text-align: center; 
        }
        .hero h1 { font-size: 4rem; margin: 0; letter-spacing: 10px; }
        .hero p { color: #fff; font-size: 1.2rem; letter-spacing: 2px; margin-top: 10px; }

        /* Grid */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        /* Card Style */
        .card { background: #fff; border-radius: 8px; overflow: hidden; position: relative; transition: 0.3s; cursor: pointer; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-info h3 { margin: 10px 0; font-size: 1.1rem; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.3rem; display: block; margin-bottom: 15px; }
        
        /* Button */
        .btn-order { background: var(--black); color: var(--gold); border: 1px solid var(--gold); padding: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-order:hover { background: var(--gold); color: var(--black); }

        /* حركة الإيموشن */
        .reaction { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; opacity: 0; pointer-events: none; z-index: 10; }
        .animate-emoji { animation: popUp 0.8s ease-out forwards; }
        @keyframes popUp { 
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 
            50% { opacity: 1; transform: translate(-50%, -80%) scale(1.2); } 
            100% { opacity: 0; transform: translate(-50%, -120%) scale(1); } 
        }

        #loading { text-align: center; font-size: 1.2rem; padding: 50px; color: var(--gold); }
    </style>
</head>
<body>

<nav><a href="#" class="nav-logo">ECLATÉ</a></nav>

<section class="hero">
    <h1>ECLATÉ</h1>
    <p>Elegant Bags & Accessories</p>
</section>

<div class="container">
    <div id="loading">جاري سحب أحدث المنتجات من الشيت...</div>
    <div class="grid" id="products-grid"></div>
</div>
