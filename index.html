<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Luxury Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --white: #ffffff; --bg-light: #fdfdfd; }
        
        /* تحسين الخطوط بناءً على اللغة */
        body { font-family: 'Cinzel', serif; margin: 0; background: var(--bg-light); color: var(--black); transition: 0.3s; overflow-x: hidden; }
        [dir="rtl"] body { font-family: 'Tajawal', sans-serif; }

        .brand-shine {
            background: linear-gradient(to right, #b29432 0%, #ffffff 50%, #b29432 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
        }
        @keyframes shine { to { background-position: 200% center; } }

        nav { background: var(--black); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-logo-text { font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; }
        .lang-btn { color: var(--gold); background: none; border: 1px solid var(--gold); padding: 6px 15px; cursor: pointer; border-radius: 20px; font-weight: bold; transition: 0.3s; }
        .lang-btn:hover { background: var(--gold); color: var(--black); }

        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=2069') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--white); }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; letter-spacing: 8px; }
        #hero-subtitle { font-size: 1.2rem; margin-top: 10px; opacity: 0.9; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        #products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .card { background: var(--white); border: 1px solid #eee; overflow: hidden; transition: 0.4s; position: relative; border-radius: 8px; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--gold); }
        
        .img-container { width: 100%; height: 350px; overflow: hidden; background: #f9f9f9; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover img { transform: scale(1.1); }

        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { margin: 10px 0; font-size: 1.3rem; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.4rem; display: block; margin-bottom: 15px; }
        
        .btn-add { background: var(--black); color: var(--gold); border: 1px solid var(--gold); padding: 12px; width: 100%; cursor: pointer; font-weight: 700; border-radius: 4px; transition: 0.3s; text-transform: uppercase; }
        .btn-add:hover { background: var(--gold); color: var(--black); }

        .cart-float { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: var(--black); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 25px rgba(212,175,55,0.4); z-index: 2000; transition: 0.3s; border: 2px solid var(--black); }
        .cart-float:active { transform: scale(0.9); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--black); color: var(--gold); width: 24px; height: 24px; border-radius: 50%; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; font-weight: bold; }

        .added-msg { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(212,175,55,0.9); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; opacity: 0; transition: 0.4s; z-index: 5; pointer-events: none; }
        .show-msg { opacity: 1; top: 10px; }

        footer { background: var(--black); padding: 40px 20px; text-align: center; color: #777; border-top: 1px solid var(--gold); }
        
        /* أنيميشن الدخول */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeInUp 0.6s ease forwards; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <span class="nav-logo-text brand-shine">ECLATÉ</span>
    </div>
    <div class="nav-right">
        <button class="lang-btn" onclick="toggleLanguage()" id="lang-toggle">العربية</button>
    </div>
</nav>

<section class="hero">
    <h1 class="brand-shine">ECLATÉ</h1>
    <p id="hero-subtitle">Elegance That Suits You</p>
</section>

<div class="container">
    <div id="products-grid">
        </div>
</div>

<div class="cart-float" onclick="checkout()">
    <i class="fas fa-shopping-bag"></i>
    <div class="cart-count" id="cart-count">0</div>
</div>

<footer>
    <p id="footer-copy">© 2026 ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    let currentLang = 'en';
    let cart = [];

    const trans = {
        en: { add: "Add to Bag", added: "Added! ✨", empty: "Your bag is empty!", subtitle: "Elegance That Suits You", wa: "Hello Eclaté, I'd like to order:\n", total: "Total", currency: "EGP" },
        ar: { add: "إضافة للسلة", added: "تمت الإضافة! ✨", empty: "السلة فارغة حالياً!", subtitle: "الأناقة التي تليق بك", wa: "أهلاً إيكلاتيه، أرغب في طلب:\n", total: "الإجمالي", currency: "ج.م" }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('lang-toggle').innerText = currentLang === 'en' ? 'العربية' : 'English';
        document.getElementById('hero-subtitle').innerText = trans[currentLang].subtitle;
        loadData();
    }

    function addToCart(name, price, btn) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        
        // تنبيه بصري عند الإضافة
        const msg = btn.parentElement.querySelector('.added-msg');
        msg.classList.add('show-msg');
        setTimeout(() => msg.classList.remove('show-msg'), 1000);
        
        // تأثير نبض للسلة
        const cartIcon = document.querySelector('.cart-float');
        cartIcon.style.transform = "scale(1.2)";
        setTimeout(() => cartIcon.style.transform = "scale(1)", 200);
    }

    function checkout() {
        if (cart.length === 0) { alert(trans[currentLang].empty); return; }
        
        let message = trans[currentLang].wa;
        let sum = 0;
        
        cart.forEach((item, i) => {
            message += `${i+1}. ${item.name} - ${item.price} ${trans[currentLang].currency}\n`;
            // استخراج الأرقام فقط من السعر للجمع
            let cleanPrice = parseFloat(item.price.toString().replace(/[^\d.]/g, ''));
            sum += isNaN(cleanPrice) ? 0 : cleanPrice;
        });
        
        message += `\n📌 ${trans[currentLang].total}: ${sum} ${trans[currentLang].currency}`;
        window.open(`https://wa.me/201011590702?text=${encodeURIComponent(message)}`, '_blank');
    }

    async function loadData() {
        try {
            const res = await fetch(sheetUrl);
            const csv = await res.text();
            const rows = csv.split(/\r?\n/).slice(1).filter(r => r.length > 10);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            rows.forEach((row, i) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 4) {
                    const [id, name, price, img] = cols.map(c => c.replace(/"/g, '').trim());
                    grid.innerHTML += `
                        <div class="card" style="animation-delay:${i*0.1}s">
                            <div class="added-msg">${trans[currentLang].added}</div>
                            <div class="img-container">
                                <img src="${img}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500'">
                            </div>
                            <div class="card-info">
                                <h3>${name}</h3>
                                <span class="price">${price} ${trans[currentLang].currency}</span>
                                <button class="btn-add" onclick="addToCart('${name}', '${price}', this)">
                                    ${trans[currentLang].add}
                                </button>
                            </div>
                        </div>`;
                }
            });
        } catch (e) {
            console.error("Error loading products");
        }
    }
    loadData();
</script>
</body>
</html>
