<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Elegant Bags & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --white: #ffffff; --bg-light: #fdfdfd; }
        body { font-family: 'Cinzel', 'Amiri', serif; margin: 0; background: var(--bg-light); color: var(--black); transition: all 0.3s ease; overflow-x: hidden; }
        
        /* Shine Effect */
        .brand-shine {
            background: linear-gradient(to right, #b29432 0%, #ffffff 50%, #b29432 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
        }
        @keyframes shine { to { background-position: 200% center; } }

        nav { background: var(--black); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
        .lang-btn { color: var(--gold); background: none; border: 1px solid var(--gold); padding: 5px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .hero { height: 70vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--white); }
        .hero h1 { font-size: clamp(3rem, 10vw, 5rem); margin: 0; letter-spacing: 10px; }

        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        #products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }

        /* Card Design */
        .card { background: var(--white); border: 1px solid #eee; overflow: hidden; transition: 0.4s; position: relative; opacity: 0; animation: fadeInUp 0.8s forwards; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card::after { content: "✨"; position: absolute; top: 15px; right: 15px; font-size: 1.5rem; opacity: 0; transition: 0.3s; }
        .card:hover::after { opacity: 1; }
        .card img { width: 100%; height: 380px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.4rem; display: block; margin-bottom: 15px; }

        .btn-add { background: var(--black); color: var(--gold); border: 1px solid var(--gold); padding: 12px; width: 100%; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-add:hover { background: var(--gold); color: var(--black); }

        /* Floating Cart Button */
        .cart-float {
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--gold); color: var(--black);
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 2000; transition: 0.3s;
        }
        .cart-float:hover { transform: scale(1.1); }
        .cart-count { position: absolute; top: 0; right: 0; background: var(--black); color: var(--gold); width: 24px; height: 24px; border-radius: 50%; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; border: 2px solid var(--gold); }

        /* Footer */
        footer { background: var(--black); padding: 40px 20px; text-align: center; color: var(--gold); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        [dir="rtl"] { font-family: 'Amiri', serif; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand"><span class="nav-logo-text brand-shine">ECLATÉ</span></div>
    <div class="nav-right">
        <button class="lang-btn" onclick="toggleLanguage()" id="lang-toggle">العربية</button>
    </div>
</nav>

<section class="hero">
    <h1 class="brand-shine">ECLATÉ</h1>
    <p id="hero-subtitle">Elegance That Suits You</p>
</section>

<div class="container">
    <div id="products-grid"></div>
</div>

<div class="cart-float" onclick="checkout()">
    <i class="fas fa-shopping-bag"></i>
    <div class="cart-count" id="cart-count">0</div>
</div>

<footer>
    <p id="footer-copy">© 2026 ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    let currentLang = 'en';
    let cart = [];

    const translations = {
        en: { subtitle: "Elegance That Suits You", add: "Add to Bag", copy: "© 2026 ECLATÉ. ALL RIGHTS RESERVED", btn: "العربية", waMsg: "Hello Eclaté, I'd like to order:\n" },
        ar: { subtitle: "أناقة تليق بكِ", add: "إضافة للسلة", copy: "جميع الحقوق محفوظة لـ إيكلاتيه ٢٠٢٦ ©", btn: "English", waMsg: "أهلاً إيكلاتيه، أرغب في طلب:\n" }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('hero-subtitle').innerText = translations[currentLang].subtitle;
        document.getElementById('lang-toggle').innerText = translations[currentLang].btn;
        loadData();
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        // حركة اهتزاز بسيطة للزر
        const btn = document.querySelector('.cart-float');
        btn.style.transform = "scale(1.2)";
        setTimeout(() => btn.style.transform = "scale(1)", 200);
    }

    function checkout() {
        if (cart.length === 0) {
            alert(currentLang === 'ar' ? "السلة فارغة!" : "Bag is empty!");
            return;
        }
        let message = translations[currentLang].waMsg;
        let total = 0;
        cart.forEach((item, index) => {
            message += `${index + 1}- ${item.name} (${item.price} EGP)\n`;
            total += parseInt(item.price);
        });
        message += `\nTotal: ${total} EGP`;
        window.open(`https://wa.me/201011590702?text=${encodeURIComponent(message)}`, '_blank');
    }

    async function loadData() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            const rows = csvData.split(/\r?\n/).slice(1).filter(r => r.trim().length > 10);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            rows.forEach((row, index) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 4) {
                    const name = cols[1].replace(/"/g, '').trim();
                    const price = cols[2].replace(/"/g, '').trim();
                    const img = cols[3].replace(/"/g, '').trim();

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.1}s`;
                    card.innerHTML = `
                        <img src="${img}" alt="${name}" onerror="this.src='https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=1000'">
                        <div class="card-info">
                            <h3>${name}</h3>
                            <span class="price">${price} EGP</span>
                            <button class="btn-add" onclick="addToCart('${name}', '${price}')">${translations[currentLang].add}</button>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        } catch (e) { console.error("Error"); }
    }
    loadData();
</script>
</body>
</html>
