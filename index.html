<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Live Catalog</title>
    <style>
        :root { --gold: #d4af37; --black: #111; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f9f9f9; text-align: center; }
        nav { background: var(--black); padding: 15px; border-bottom: 2px solid var(--gold); }
        .nav-logo { color: var(--gold); font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; display: block; margin: 10px 0; }
        .btn-order { background: var(--black); color: var(--gold); border: 1px solid var(--gold); padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .reaction { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; opacity: 0; pointer-events: none; }
        .animate-emoji { animation: popUp 0.8s ease-out; }
        @keyframes popUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -120%) scale(1.5); } }
    </style>
</head>
<body>

<nav><div class="nav-logo">ECLATÉ</div></nav>

<div class="grid" id="products-grid">جاري تحميل المنتجات...</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';

    async function loadData() {
        const response = await fetch(sheetUrl);
        const data = await response.text();
        const rows = data.split('\n').slice(1);
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';

        rows.forEach(row => {
            const cols = row.split(',');
            if (cols.length < 5) return;

            // الترتيب الصحيح حسب صورة الشيت بتاعك:
            // [0]=ID, [1]=Name, [2]=Price, [3]=Image, [4]=Category, [5]=Type
            const name = cols[1];
            const price = cols[2];
            const imgName = cols[3].trim();

            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                const emo = card.querySelector('.reaction');
                emo.classList.add('animate-emoji');
                setTimeout(() => emo.classList.remove('animate-emoji'), 800);
            };

            card.innerHTML = `
                <div class="reaction">❤️</div>
                <img src="${imgName}" onerror="this.src='https://via.placeholder.com/350?text=${name}'">
                <div class="card-info">
                    <h3>${name}</h3>
                    <span class="price">${price} EGP</span>
                    <button class="btn-order">طلب الآن</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }
    loadData();
</script>
</body>
</html>
