<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Curated Luxury Bags</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold: #d4af37; /* ذهبي ملكي مطابقة للوجو */
            --black: #0a0a0a; 
            --white: #ffffff; 
            --bg-light: #f8f8f8;
        }

        /* تطبيق خط Cinzel على الموقع بالكامل لإعطاء بصمة فريدة */
        body { font-family: 'Cinzel', serif; margin: 0; background: var(--bg-light); color: var(--black); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Navbar */
        nav { background: var(--black); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .nav-brand { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .nav-logo-img { height: 45px; width: auto; }
        .nav-logo-text { color: var(--gold); font-size: 1.8rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        
        .nav-socials a { color: var(--gold); margin-right: 20px; font-size: 1.4rem; transition: 0.3s ease; }
        .nav-socials a:hover { color: var(--white); transform: translateY(-3px); }

        /* Hero Section */
        .hero { 
            height: 85vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero.jpg'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; padding: 0 20px;
        }
        .hero-logo { width: clamp(180px, 30vw, 300px); height: auto; margin-bottom: 20px; animation: fadeInDown 1.5s ease-out; }
        /* الكلمة الكبيرة بخط Cinzel الوزن الثقيل */
        .hero h1 { color: var(--gold); font-size: clamp(3.5rem, 12vw, 6.5rem); margin: 0; letter-spacing: 18px; font-weight: 900; animation: fadeInUp 1.2s ease-out; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .hero p { color: var(--white); font-size: 1.5rem; margin-top: 15px; letter-spacing: 6px; opacity: 0.9; font-weight: 400; }

        /* Products Grid */
        .container { max-width: 1260px; margin: 70px auto; padding: 0 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }
        
        /* Card Style */
        .card { 
            background: var(--white); border-radius: 4px; overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03);
            opacity: 0; animation: fadeInUp 1s ease-out forwards; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 45px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 420px; object-fit: cover; transition: transform 0.6s; }
        .card:hover img { transform: scale(1.05); }

        .card-info { padding: 30px; text-align: center; }
        .card-info h3 { margin: 0 0 12px; font-size: 1.2rem; color: var(--black); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.7rem; display: block; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* Order Button */
        .btn-order { 
            background: var(--black); color: var(--gold); border: 2px solid var(--gold); 
            padding: 15px; width: 100%; font-weight: 700; cursor: pointer; 
            text-decoration: none; display: inline-block; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem;
        }
        .btn-order:hover { background: var(--gold); color: var(--black); }

        /* Footer */
        footer { background: var(--black); padding: 60px 20px; text-align: center; border-top: 2px solid var(--gold); }
        .footer-socials a { color: var(--gold); font-size: 2.5rem; margin: 0 20px; transition: 0.3s; display: inline-block; }
        .footer-socials a:hover { transform: scale(1.2); color: var(--white); }
        footer p { color: var(--gold); opacity: 0.7; margin-top: 30px; letter-spacing: 2px; font-size: 0.9rem; text-transform: uppercase; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <img src="logo.png" alt="" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">ECLATÉ</span>
    </div>
    <div class="nav-socials">
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
</nav>

<section class="hero">
    <img src="logo.png" alt="" class="hero-logo" onerror="this.style.display='none'">
    <h1>ECLATÉ</h1>
    <p>أناقة تليق بكِ</p>
</section>

<div class="container">
    <div class="grid" id="products-grid">جاري تحميل تشكيلتنا الفخمة...</div>
</div>

<footer>
    <div class="footer-socials">
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://wa.me/201011590702" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
    <p>&copy; 2026 ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED.</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    const whatsappNumber = '201011590702';

    async function loadData() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            const rows = csvData.split('\n').slice(1);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            rows.forEach((row, index) => {
                const cols = row.split(',');
                if (cols.length >= 4) {
                    const name = cols[1].trim();
                    const price = cols[2].trim();
                    const img = cols[3].trim();
                    const waMessage = encodeURIComponent(`أهلاً Eclaté، أرغب في طلب هذه القطعة المميزة: ${name}`);

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.1s}`; 
                    card.innerHTML = `
                        <img src="${img}" alt="${name}" onerror="this.src='https://via.placeholder.com/400x520?text=Eclaté+Lux'">
                        <div class="card-info">
                            <h3>${name}</h3>
                            <span class="price">${price} EGP</span>
                            <a href="https://wa.me/${whatsappNumber}?text=${waMessage}" target="_blank" class="btn-order">Order via WhatsApp</a>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        } catch (e) { console.log("Error loading data"); }
    }
    loadData();
</script>
</body>
</html>
