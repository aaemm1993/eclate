<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Elegant Bags & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --white: #ffffff; --bg-light: #fdfdfd; }
        body { font-family: 'Cinzel', 'Amiri', serif; margin: 0; background: var(--bg-light); color: var(--black); transition: 0.3s; overflow-x: hidden; }
        
        /* تأثير اللمعان ✨ */
        .brand-shine {
            background: linear-gradient(to right, #b29432 0%, #ffffff 50%, #b29432 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Navbar */
        nav { background: var(--black); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        
        /* ضبط اللوجو والاسم جنب بعض */
        .brand-wrapper { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .nav-logo-img { height: 40px; width: auto; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3)); }
        .nav-logo-text { font-size: 1.6rem; font-weight: 700; letter-spacing: 2px; margin: 0; }
        
        .lang-btn { color: var(--gold); background: none; border: 1px solid var(--gold); padding: 5px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        /* Hero Section */
        .hero { height: 75vh; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('hero.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--white); }
        
        /* الهيرو - اللوجو والاسم جنب بعض */
        .hero-brand-box { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .hero-logo { width: 80px; height: auto; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; letter-spacing: 8px; line-height: 1; }
        .hero p { font-size: 1.2rem; margin-top: 15px; letter-spacing: 4px; opacity: 0.9; }

        /* Container & Grid */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        #products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }

        /* Card Design */
        .card { background: var(--white); border: 1px solid #eee; overflow: hidden; transition: 0.4s; position: relative; opacity: 0; animation: fadeInUp 0.8s forwards; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card::after { content: "✨"; position: absolute; top: 15px; right: 15px; font-size: 1.8rem; opacity: 0; transition: 0.4s; transform: scale(0); z-index: 2; }
        .card:hover::after { opacity: 1; transform: scale(1.2) rotate(10deg); }
        
        .img-container { width: 100%; height: 380px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        .card-info { padding: 20px; text-align: center; position: relative; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.5rem; display: block; margin-bottom: 15px; }
        .btn-add { background: var(--black); color: var(--gold); border: 1px solid var(--gold); padding: 12px; width: 100%; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-add:hover { background: var(--gold); color: var(--black); }

        .added-msg { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: var(--gold); font-weight: bold; opacity: 0; transition: 0.3s; pointer-events: none; }
        .show-msg { opacity: 1; top: -40px; }

        /* Cart Float */
        .cart-float { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: var(--black); width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 2000; border: 2px solid var(--black); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--black); color: var(--gold); width: 26px; height: 26px; border-radius: 50%; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; border: 2px solid var(--gold); font-weight: bold; }

        footer { background: var(--black); padding: 40px 20px; text-align: center; color: var(--gold); border-top: 1px solid var(--gold); }
        .footer-socials { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .footer-socials a { color: var(--gold); font-size: 2rem; transition: 0.3s; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        [dir="rtl"] { font-family: 'Amiri', serif; }
    </style>
</head>
<body>

<nav>
    <div class="brand-wrapper">
        <img src="logo.png" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text brand-shine">ECLATÉ</span>
    </div>
    <div class="nav-right">
        <button class="lang-btn" onclick="toggleLanguage()" id="lang-toggle">العربية</button>
    </div>
</nav>

<section class="hero">
    <div class="hero-brand-box">
        <img src="logo.png" class="hero-logo" onerror="this.style.display='none'">
        <h1 class="brand-shine">ECLATÉ</h1>
    </div>
    <p id="hero-subtitle">Elegance That Suits You</p>
</section>

<div class="container"><div id="products-grid"></div></div>

<div class="cart-float" onclick="checkout()">
    <i class="fas fa-shopping-bag"></i>
    <div class="cart-count" id="cart-count">0</div>
</div>

<footer>
    <div class="footer-socials">
        <a href="https://wa.me/201011590702" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
    <p id="footer-copy">© 2026 ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    let currentLang = 'en';
    let cart = [];

    const trans = {
        en: { subtitle: "Elegance That Suits You", add: "Add to Bag", added: "Added! ✨", empty: "Bag is empty!", wa: "Hello Eclaté, I'd like to order:\n" },
        ar: { subtitle: "أناقة تليق بكِ", add: "إضافة للسلة", added: "تمت الإضافة! ✨", empty: "السلة فارغة!", wa: "أهلاً إيكلاتيه، أرغب في طلب:\n" }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('lang-toggle').innerText = currentLang === 'en' ? 'العربية' : 'English';
        document.getElementById('hero-subtitle').innerText = trans[currentLang].subtitle;
        loadData();
    }

    function addToCart(name, price, btn) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        const msg = btn.parentElement.querySelector('.added-msg');
        msg.classList.add('show-msg');
        setTimeout(() => msg.classList.remove('show-msg'), 800);
    }

    function checkout() {
        if (cart.length === 0) { alert(trans[currentLang].empty); return; }
        let message = trans[currentLang].wa;
        let total = 0;
        cart.forEach((item, i) => {
            message += `${i+1}- ${item.name} (${item.price} EGP)\n`;
            total += parseInt(item.price.toString().replace(/[^\d]/g, ''));
        });
        message += `\nTotal: ${total} EGP`;
        window.open(`https://wa.me/201011590702?text=${encodeURIComponent(message)}`, '_blank');
    }

    async function loadData() {
        try {
            const res = await fetch(sheetUrl);
            const csv = await res.text();
            const rows = csv.split(/\r?\n/).slice(1).filter(r => r.length > 10);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            rows.forEach((row, i) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 4) {
                    const [id, name, price, img] = cols.map(c => c.replace(/"/g, '').trim());
                    grid.innerHTML += `
                        <div class="card" style="animation-delay:${i*0.1}s">
                            <div class="img-container"><img src="${img}" onerror="this.src='https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=1000'"></div>
                            <div class="card-info">
                                <div class="added-msg">${trans[currentLang].added}</div>
                                <h3>${name}</h3>
                                <span class="price">${price} EGP</span>
                                <button class="btn-add" onclick="addToCart('${name}', '${price}', this)">${trans[currentLang].add}</button>
                            </div>
                        </div>`;
                }
            });
        } catch (e) { console.error("Error"); }
    }
    loadData();
</script>
</body>
</html>
