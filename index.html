<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Elegant Bags & Accessories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التعديل الجوهري في درجة اللون الذهبي لتطابق اللوجو */
        :root { 
            --gold: #d4af37; /* درجة الذهبي المطابقة للوجو */
            --black: #0a0a0a; 
            --white: #ffffff; 
            --bg-light: #f8f8f8;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg-light); color: var(--black); overflow-x: hidden; }
        
        /* Navbar */
        nav { background: var(--black); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-brand img { height: 45px; width: auto; }
        .nav-socials a { color: var(--gold); margin-right: 18px; font-size: 1.3rem; transition: 0.3s; }
        .nav-socials a:hover { color: var(--white); }

        /* Hero Section */
        .hero { 
            height: 80vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero.jpg'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; padding: 0 20px;
        }
        .hero-logo { width: clamp(200px, 35vw, 350px); height: auto; margin-bottom: 20px; animation: fadeInDown 1.2s ease-out; }
        /* لون النص تحت اللوجو بقى نفس درجة الذهبي */
        .hero p { color: var(--gold); font-size: 1.4rem; margin-top: 15px; letter-spacing: 5px; font-weight: bold; }

        /* Products Grid */
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; }
        
        /* Card Style */
        .card { 
            background: var(--white); border-radius: 8px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee;
            opacity: 0; animation: fadeInUp 0.8s ease-out forwards; transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 380px; object-fit: cover; }
        
        .card-info { padding: 25px; text-align: center; }
        /* اسم الشنطة بالأسود الفخم */
        .card-info h3 { margin-bottom: 10px; font-size: 1.2rem; color: var(--black); }
        /* السعر بنفس درجة ذهبي اللوجو */
        .price { color: var(--gold); font-weight: bold; font-size: 1.6rem; display: block; margin-bottom: 20px; }
        
        /* الزراير بنفس درجة ذهبي اللوجو */
        .btn-order { 
            background: var(--black); color: var(--gold); border: 2px solid var(--gold); 
            padding: 12px; width: 100%; font-weight: bold; cursor: pointer; 
            text-decoration: none; display: inline-block; border-radius: 4px; transition: 0.3s;
        }
        .btn-order:hover { background: var(--gold); color: var(--black); }

        /* Footer */
        footer { background: var(--black); padding: 50px 20px; text-align: center; border-top: 2px solid var(--gold); }
        .footer-logo { height: 60px; width: auto; margin-bottom: 20px; }
        .footer-socials a { color: var(--gold); font-size: 2rem; margin: 0 15px; transition: 0.3s; }
        footer p { color: var(--gold); opacity: 0.7; margin-top: 20px; font-size: 0.9rem; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="nav-brand">
        <img src="logo.png" alt="Eclaté Logo" onerror="this.style.display='none'">
    </a>
    <div class="nav-socials">
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
</nav>

<section class="hero">
    <img src="logo.png" alt="Eclaté Logo Large" class="hero-logo" onerror="this.style.display='none'">
    <p>أناقة تليق بكِ</p>
</section>

<div class="container">
    <div class="grid" id="products-grid"></div>
</div>

<footer>
    <img src="logo.png" alt="Eclaté Footer" class="footer-logo">
    <div class="footer-socials">
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://wa.me/201011590702" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
    <p>&copy; 2026 ECLATÉ. ALL RIGHTS RESERVED.</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    const whatsappNumber = '201011590702';

    async function loadData() {
        const response = await fetch(sheetUrl);
        const csvData = await response.text();
        const rows = csvData.split('\n').slice(1);
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';

        rows.forEach((row, index) => {
            const cols = row.split(',');
            if (cols.length >= 4) {
                const name = cols[1].trim();
                const price = cols[2].trim();
                const img = cols[3].trim();
                const waMessage = encodeURIComponent(`أهلاً Eclaté، أرغب في طلب هذه القطعة المميزة: ${name}`);

                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.15}s`; 
                card.innerHTML = `
                    <img src="${img}" alt="${name}">
                    <div class="card-info">
                        <h3>${name}</h3>
                        <span class="price">${price} EGP</span>
                        <a href="https://wa.me/${whatsappNumber}?text=${waMessage}" target="_blank" class="btn-order">Order via WhatsApp</a>
                    </div>
                `;
                grid.appendChild(card);
            }
        });
    }
    loadData();
</script>
</body>
</html>
