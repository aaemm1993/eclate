<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #111; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; color: var(--black); }
        
        /* الهيدر زي ما كان عاجبك */
        header { background: var(--black); color: var(--gold); padding: 40px 20px; text-align: center; }
        .logo { font-size: 3rem; letter-spacing: 10px; margin: 0; font-weight: bold; }
        .tagline { color: #fff; letter-spacing: 2px; font-size: 0.9rem; margin-top: 10px; }

        /* تظبيط عرض المنتجات */
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        
        /* الكارت الفخم */
        .card { background: #fff; padding: 0; text-align: center; border: 1px solid #f0f0f0; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        
        /* أهم جزء: تثبيت عرض وطول الصورة */
        .card img { width: 100%; height: 320px; object-fit: cover; display: block; background: #eee; }
        
        .card-info { padding: 15px; }
        .card h3 { font-size: 1.1rem; margin: 10px 0; color: #333; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 15px; }
        
        .btn-add { background: var(--black); color: #fff; border: none; width: 100%; padding: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { background: var(--gold); color: var(--black); }

        /* السلة الطائرة */
        .cart-icon { position: fixed; bottom: 20px; left: 20px; background: var(--gold); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; }
        .cart-count { position: absolute; top: 0; right: 0; background: red; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        /* القائمة الجانبية للسلة */
        #cart-sidebar { position: fixed; top: 0; left: -350px; width: 300px; height: 100%; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 2000; padding: 20px; }
        #cart-sidebar.open { left: 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .checkout-btn { background: #25d366; color: #fff; width: 100%; padding: 15px; border: none; margin-top: 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        footer { background: #000; color: #fff; padding: 40px; text-align: center; margin-top: 50px; }
        .social-links a { color: var(--gold); font-size: 1.8rem; margin: 0 15px; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">ECLATÉ</h1>
    <div class="tagline">Elegant Bags for Elegant Women</div>
</header>

<div class="container">
    <div class="grid" id="products-grid">
        </div>
</div>

<div class="cart-icon" onclick="toggleCart()">
    <i class="fas fa-shopping-bag"></i>
    <div class="cart-count" id="cart-count">0</div>
</div>

<div id="cart-sidebar">
    <h3>سلة المشتريات</h3>
    <div id="cart-items"></div>
    <p style="font-weight: bold; margin-top: 20px;">الإجمالي: <span id="cart-total">0</span> ج.م</p>
    <button class="checkout-btn" onclick="sendWhatsApp()">إتمام الطلب عبر واتساب</button>
    <button onclick="toggleCart()" style="background:none; border:none; color:#999; width:100%; margin-top:10px; cursor:pointer;">إغلاق</button>
</div>

<footer>
    <div class="social-links">
        <a href="https://www.instagram.com/eclate_eg/"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg"><i class="fab fa-tiktok"></i></a>
    </div>
</footer>

<script>
    let cart = [];
    let products = [];
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv";

    async function loadProducts() {
        const response = await fetch(sheetURL);
        const data = await response.text();
        const rows = data.split('\n').slice(1);
        products = rows.map(row => {
            const cols = row.split(',');
            return { id: cols[0], name: cols[1], price: parseInt(cols[2]), img: cols[3]?.trim() };
        }).filter(p => p.name);
        render();
    }

    function render() {
        document.getElementById('products-grid').innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <div class="card-info">
                    <h3>${p.name}</h3>
                    <span class="price">${p.price} ج.م</span>
                    <button class="btn-add" onclick="addToCart('${p.id}')">إضافة للحقيبة</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(x => x.id == id);
        cart.push(p);
        updateCart();
        toggleCart(true);
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-items').innerHTML = cart.map(i => `
            <div class="cart-item"><span>${i.name}</span><span>${i.price} ج.م</span></div>
        `).join('');
        document.getElementById('cart-total').innerText = cart.reduce((s, i) => s + i.price, 0);
    }

    function toggleCart(show) {
        const s = document.getElementById('cart-sidebar');
        if (show === true) s.classList.add('open');
        else s.classList.toggle('open');
    }

    function sendWhatsApp() {
        if (cart.length === 0) return alert("السلة فارغة");
        let msg = "طلب جديد من Eclaté:%0a";
        cart.forEach(i => msg += `- ${i.name} (${i.price} ج.م)%0a`);
        msg += `%0aالإجمالي: ${document.getElementById('cart-total').innerText} ج.م`;
        window.open(`https://wa.me/201011590702?text=${msg}`);
    }

    loadProducts();
</script>
</body>
</html>
