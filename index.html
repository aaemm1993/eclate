<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Elegant Bags & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --white: #ffffff; --bg-light: #e5e5e5; }
        body { font-family: 'Cinzel', 'Amiri', serif; margin: 0; background: var(--bg-light); color: var(--black); transition: 0.3s; overflow-x: hidden; }
        
        /* تأثير اللمعان الذهبي */
        .brand-shine {
            background: linear-gradient(to right, #b29432 0%, #ffffff 50%, #b29432 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Navbar */
        nav { background: var(--black); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-brand { display: flex; align-items: center; gap: 12px; }
        .nav-logo-img { height: 35px; width: auto; animation: rotateContinuous 8s linear infinite; }
        @keyframes rotateContinuous { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .nav-logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }

        .lang-btn { color: var(--gold); background: none; border: 1px solid var(--gold); padding: 5px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: inherit; transition: 0.3s; }
        .lang-btn:hover { background: var(--gold); color: var(--black); }

        /* Hero Section */
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--white); }
        .hero-logo { width: 150px; margin-bottom: 20px; animation: rotateOnce 2.5s ease-out forwards; }
        @keyframes rotateOnce { 0% { transform: rotateY(0deg); opacity: 0; } 100% { transform: rotateY(360deg); opacity: 1; } }
        .hero h1 { font-size: clamp(3rem, 10vw, 5rem); margin: 0; letter-spacing: 10px; }

        /* Grid */
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        #products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        
        /* Product Card */
        .card { background: #111; border: 1px solid var(--gold); transition: 0.5s ease; position: relative; opacity: 0; animation: fadeInUp 0.8s forwards; padding: 12px; }
        .card:hover { transform: translateY(-10px); border-color: var(--white); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2); }

        .img-container { width: 100%; height: 400px; overflow: hidden; border: 1px solid #333; position: relative; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .swiper-pagination-bullet { background: var(--gold) !important; }

        .card-info { padding: 20px 5px; text-align: center; }
        .card-info h3 { color: var(--white); font-size: 1.1rem; margin: 0; letter-spacing: 1px; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.4rem; display: block; margin: 12px 0; }
        
        .btn-add { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 15px; width: 100%; cursor: pointer; font-weight: 700; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
        .btn-add:hover { background: var(--gold); color: var(--black); }

        /* Cart Float */
        .cart-float { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: var(--black); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; z-index: 2000; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--black); color: var(--gold); width: 22px; height: 22px; border-radius: 50%; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; border: 1px solid var(--gold); }

        footer { background: var(--black); padding: 50px; text-align: center; color: var(--gold); border-top: 1px solid var(--gold); }
        .footer-socials { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .footer-socials a { color: var(--gold); font-size: 1.8rem; transition: 0.3s; }
        .footer-socials a:hover { color: var(--white); transform: translateY(-3px); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        [dir="rtl"] { font-family: 'Amiri', serif; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <img src="https://raw.githubusercontent.com/aaemm1993/ECLATE/main/logo.png" class="nav-logo-img" alt="Logo">
        <span class="nav-logo-text brand-shine">ECLATÉ</span>
    </div>
    <div class="nav-right">
        <button class="lang-btn" onclick="toggleLanguage()" id="lang-toggle">العربية</button>
    </div>
</nav>

<section class="hero">
    <img src="https://raw.githubusercontent.com/aaemm1993/ECLATE/main/logo.png" class="hero-logo" alt="Luxury Logo">
    <h1 class="brand-shine">ECLATÉ</h1>
    <p id="hero-subtitle">Elegance That Suits You</p>
</section>

<div class="container"><div id="products-grid"></div></div>

<div class="cart-float" onclick="checkout()">
    <i class="fas fa-shopping-bag"></i>
    <div class="cart-count" id="cart-count">0</div>
</div>

<footer>
    <div class="footer-socials">
        <a href="https://wa.me/201011590702" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
    <p class="footer-copy">© 2026 ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    const baseURL = "https://raw.githubusercontent.com/aaemm1993/ECLATE/main/";
    let currentLang = 'en';
    let cart = [];

    const trans = {
        en: { add: "Add to Bag", empty: "Your bag is empty!", wa: "Hello Eclaté, I'd like to order:\n", subtitle: "Elegance That Suits You" },
        ar: { add: "إضافة للسلة", empty: "السلة فارغة حالياً!", wa: "أهلاً إيكلاتيه، أرغب في طلب هذه المنتجات:\n", subtitle: "أناقة تليق بكِ" }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('lang-toggle').innerText = currentLang === 'en' ? 'العربية' : 'English';
        document.getElementById('hero-subtitle').innerText = trans[currentLang].subtitle;
        loadData();
    }

    async function loadData() {
        try {
            const res = await fetch(sheetUrl);
            const csv = await res.text();
            const rows = csv.split(/\r?\n/).slice(1).filter(r => r.trim().length > 10);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            rows.forEach((row, i) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 7) {
                    const name = cols[1].replace(/"/g, '').trim();
                    const price = cols[2].replace(/"/g, '').trim();
                    // تجميع الصور الأربعة
                    const imgs = [cols[3], cols[4], cols[5], cols[6]].map(img => baseURL + img.replace(/"/g, '').trim());

                    grid.innerHTML += `
                        <div class="card" style="animation-delay:${i*0.1}s">
                            <div class="img-container">
                                <div class="swiper mySwiper-${i}">
                                    <div class="swiper-wrapper">
                                        ${imgs.map(src => `<div class="swiper-slide"><img src="${src}" onerror="this.src='https://via.placeholder.com/400x500?text=Eclaté+Product'"></div>`).join('')}
                                    </div>
                                    <div class="swiper-pagination"></div>
                                </div>
                            </div>
                            <div class="card-info">
                                <h3>${name}</h3>
                                <span class="price">${price} EGP</span>
                                <button class="btn-add" onclick="addToCart('${name}', '${price}')">${trans[currentLang].add}</button>
                            </div>
                        </div>`;

                    // تشغيل السلايدر لكل كارد
                    setTimeout(() => {
                        new Swiper(`.mySwiper-${i}`, {
                            loop: true,
                            pagination: { el: '.swiper-pagination', clickable: true },
                            autoplay: { delay: 4000, disableOnInteraction: false },
                        });
                    }, 100);
                }
            });
        } catch (e) { console.error("Error fetching data"); }
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        // تأثير اهتزاز بسيط عند الإضافة
        const icon = document.querySelector('.cart-float');
        icon.style.transform = 'scale(1.2)';
        setTimeout(() => icon.style.transform = 'scale(1)', 200);
    }

    function checkout() {
        if (cart.length === 0) { alert(trans[currentLang].empty); return; }
        let message = trans[currentLang].wa;
        let total = 0;
        cart.forEach((item, i) => {
            message += `${i+1}- ${item.name} (${item.price} EGP)\n`;
            total += parseInt(item.price.replace(/[^\d]/g, ''));
        });
        message += `\n*Total: ${total} EGP*`;
        window.open(`https://wa.me/201011590702?text=${encodeURIComponent(message)}`, '_blank');
    }

    // تشغيل الكود أول ما الصفحة تفتح
    window.onload = loadData;
</script>
</body>
</html>
