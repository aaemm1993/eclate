<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Elegant Bags & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold: #d4af37; 
            --black: #0a0a0a; 
            --white: #ffffff; 
            --bg-light: #fdfdfd;
        }

        body { font-family: 'Cinzel', serif; margin: 0; background: var(--bg-light); color: var(--black); overflow-x: hidden; text-align: center; }
        
        /* Navbar */
        nav { background: var(--black); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-img { height: 40px; width: auto; }
        .nav-logo-text { color: var(--gold); font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; }
        .nav-socials a { color: var(--gold); margin-right: 15px; font-size: 1.3rem; transition: 0.3s; }

        /* Hero */
        .hero { 
            height: 70vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero.jpg'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 0 20px;
        }
        .hero h1 { color: var(--gold); font-size: clamp(3rem, 10vw, 5.5rem); margin: 0; letter-spacing: 12px; font-weight: 900; }
        .hero p { color: var(--white); font-size: 1.2rem; margin-top: 10px; letter-spacing: 4px; opacity: 0.8; }

        /* Products Grid & Loading Message */
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; min-height: 300px; }
        
        /* تعديل جملة التحميل لتكون في المنتصف وبشكل فخم */
        #products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; 
            justify-content: center;
            align-items: center;
        }
        .loading-msg { 
            grid-column: 1 / -1; 
            color: var(--gold); 
            font-size: 1.2rem; 
            letter-spacing: 2px;
            padding: 50px 0;
        }

        /* Product Card */
        .card { 
            background: var(--white); border-radius: 2px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee;
            opacity: 0; animation: fadeInUp 0.8s ease-out forwards;
        }
        .card img { width: 100%; height: 400px; object-fit: cover; }
        .card-info { padding: 25px; }
        .card-info h3 { margin-bottom: 10px; font-size: 1.1rem; letter-spacing: 1px; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.5rem; display: block; margin-bottom: 20px; }
        .btn-order { 
            background: var(--black); color: var(--gold); border: 1px solid var(--gold); 
            padding: 12px; width: 100%; font-weight: 700; text-decoration: none; 
            display: inline-block; transition: 0.3s; letter-spacing: 2px; font-size: 0.8rem;
        }
        .btn-order:hover { background: var(--gold); color: var(--black); }

        /* Footer */
        footer { background: var(--black); padding: 60px 20px; text-align: center; border-top: 1px solid var(--gold); }
        .footer-socials { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .footer-socials a { color: var(--gold); font-size: 2.2rem; transition: 0.3s; }
        .footer-socials a:hover { transform: scale(1.1); color: var(--white); }
        footer p { color: var(--gold); opacity: 0.6; font-size: 0.8rem; letter-spacing: 2px; margin: 0; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <img src="logo.png" alt="" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">ECLATÉ</span>
    </div>
    <div class="nav-socials">
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
</nav>

<section class="hero">
    <h1>ECLATÉ</h1>
    <p>أناقة تليق بكِ</p>
</section>

<div class="container">
    <div id="products-grid">
        <div class="loading-msg">جاري تحميل تشكيلتنا الفخمة...</div>
    </div>
</div>

<footer>
    <div class="footer-socials">
        <a href="https://wa.me/201011590702" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
    <p>.ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED 2026 ©</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    const whatsappNumber = '201011590702';

    async function loadData() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            const rows = csvData.split('\n').slice(1);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            rows.forEach((row, index) => {
                const cols = row.split(',');
                if (cols.length >= 4) {
                    const name = cols[1].trim();
                    const price = cols[2].trim();
                    const img = cols[3].trim();
                    const waMessage = encodeURIComponent(`أهلاً Eclaté، أرغب في طلب: ${name}`);

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.1}s`; 
                    card.innerHTML = `
                        <img src="${img}" alt="${name}" onerror="this.src='https://via.placeholder.com/400x500?text=Eclaté'">
                        <div class="card-info">
                            <h3>${name}</h3>
                            <span class="price">${price} EGP</span>
                            <a href="https://wa.me/${whatsappNumber}?text=${waMessage}" target="_blank" class="btn-order">Order via WhatsApp</a>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        } catch (e) { 
            document.getElementById('products-grid').innerHTML = '<div class="loading-msg">نعتذر، حدث خطأ في تحميل المنتجات.</div>';
        }
    }
    loadData();
</script>
</body>
</html>
