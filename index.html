<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté Egypt | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --black: #0a0a0a; --grey: #1a1a1a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--black); color: var(--white); }

        /* تعديل القائمة عشان تظهر بوضوح */
        nav {
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: #000000; /* خلفية سوداء صريحة */
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            z-index: 9999; /* أعلى طبقة */
            border-bottom: 1px solid var(--gold);
        }
        .logo-text { font-family: 'Montserrat', sans-serif; font-size: 20px; color: var(--gold); text-decoration: none; letter-spacing: 3px; font-weight: 600; }
        
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-right: 20px; }
        .nav-links a { color: var(--white); text-decoration: none; font-size: 14px; font-weight: 400; }
        .nav-links a:hover { color: var(--gold); }

        .hero {
            height: 70vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('bag1.jpg') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center;
            padding-top: 80px; /* عشان الكلام ميبقاش ورا الناف بار */
        }
        
        .section-title { font-family: 'Amiri', serif; font-size: 2.5rem; text-align: center; color: var(--gold); margin: 60px 0; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1300px; margin: 0 auto; padding: 20px; }
        .product-card { background: var(--grey); border: 1px solid #222; transition: 0.4s; overflow: hidden; text-align: center; }
        .product-img { width: 100%; height: 380px; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-price { color: var(--gold); font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }
        
        .btn-order { background: var(--gold); color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Cairo'; }

        #orderModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;
        }
        .modal-content { background: var(--grey); padding: 30px; width: 90%; max-width: 400px; border: 1px solid var(--gold); text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; text-align: right; font-family: 'Cairo'; }

        footer { padding: 40px; text-align: center; border-top: 1px solid #222; font-size: 11px; color: #666; }

        /* للموبايل */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* القوائم بتختفي في الموبايل عشان متبقاش زحمة، لو عاوزها تظهر قولي */
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-text">ECLATÉ</a>
        <ul class="nav-links">
            <li><a href="#shop">المتجر</a></li>
            <li><a href="#policy">الاستبدال</a></li>
            <li><a href="https://wa.me/201011590702">تواصل معنا</a></li>
        </ul>
    </nav>

    <section class="hero" data-aos="fade-in">
        <h1 data-aos="zoom-in">ECLATÉ</h1>
        <p data-aos="fade-up" data-aos-delay="500">Luxury Handbags | فخامة تليق بكِ</p>
    </section>

    <section id="shop">
        <h2 class="section-title" data-aos="fade-up">The Collection</h2>
        <div class="product-grid" id="product-container">
            <script>
                const container = document.getElementById('product-container');
                for (let i = 1; i <= 12; i++) {
                    container.innerHTML += `
                        <div class="product-card" data-aos="fade-up">
                            <img src="bag${i}.jpg" class="product-img" onerror="this.src='https://via.placeholder.com/400x500?text=Bag+${i}'">
                            <div class="product-info">
                                <p style="margin-bottom:10px; font-weight:600">ECLATÉ BAG #${i}</p>
                                <p class="product-price">1,000 EGP</p>
                                <button class="btn-order" onclick="openOrder('Bag #${i}')">اطلبي الآن</button>
                            </div>
                        </div>
                    `;
                }
            </script>
        </div>
    </section>

    <section id="policy" style="padding: 60px 5%; background: #050505;">
        <h2 class="section-title">سياسة الاستبدال</h2>
        <div style="max-width: 700px; margin: 0 auto; text-align: center; color: #ccc;">
            <p>الاستبدال والاسترجاع خلال 14 يوماً بشرط الحالة الأصلية.</p>
        </div>
    </section>

    <div id="orderModal">
        <div class="modal-content">
            <h3 style="color:var(--gold); margin-bottom:20px">بيانات الطلب</h3>
            <input type="text" id="custName" placeholder="الاسم بالكامل">
            <input type="text" id="custAddress" placeholder="العنوان بالتفصيل">
            <input type="text" id="custPhone" placeholder="رقم الموبايل">
            <button class="btn-order" onclick="sendToWhatsapp()">تأكيد الطلب</button>
            <button style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer" onclick="closeOrder()">إلغاء</button>
        </div>
    </div>

    <footer><p>© 2026 ECLATÉ EGYPT. ALL RIGHTS RESERVED.</p></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        let selectedBag = "";
        const myNum = "201011590702";

        function openOrder(name) {
            selectedBag = name;
            document.getElementById('orderModal').style.display = 'flex';
        }
        function closeOrder() {
            document.getElementById('orderModal').style.display = 'none';
        }
        function sendToWhatsapp() {
            const name = document.getElementById('custName').value;
            const addr = document.getElementById('custAddress').value;
            const phone = document.getElementById('custPhone').value;
            if(!name || !addr || !phone) return alert("برجاء ملء البيانات");
            const msg = `أريد طلب:%0Aالمنتج: ${selectedBag}%0Aالاسم: ${name}%0Aالعنوان: ${addr}%0Aالتليفون: ${phone}`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
