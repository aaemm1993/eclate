<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclaté - Elegant Bags & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --white: #ffffff; --bg-light: #fdfdfd; }
        
        body { font-family: 'Cinzel', 'Amiri', serif; margin: 0; background: var(--bg-light); color: var(--black); transition: all 0.3s ease; overflow-x: hidden; }
        
        /* Navbar */
        nav { background: var(--black); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo-img { height: 35px; width: auto; }
        .nav-logo-text { color: var(--gold); font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .lang-btn { color: var(--gold); background: none; border: 1px solid var(--gold); padding: 5px 12px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; border-radius: 4px; }
        .lang-btn:hover { background: var(--gold); color: var(--black); }

        /* Hero */
        .hero { height: 75vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--white); }
        .hero-logo { width: 130px; margin-bottom: 15px; }
        .hero h1 { color: var(--gold); font-size: clamp(3rem, 10vw, 5rem); margin: 0; letter-spacing: 10px; }
        .hero p { font-size: 1.2rem; margin-top: 10px; letter-spacing: 3px; }

        /* Grid */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        #products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }

        /* Card & Heart Animation ✨ */
        .card { background: var(--white); border: 1px solid #eee; overflow: hidden; opacity: 0; animation: fadeInUp 0.8s forwards; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .card:hover { transform: translateY(-12px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        
        /* حركة الإيموشن السحرية المحدثة */
        .card::before { 
            content: "✨"; position: absolute; top: 15px; right: 15px; z-index: 2;
            font-size: 1.8rem; opacity: 0; transition: 0.5s; transform: scale(0) rotate(-20deg);
        }
        .card:hover::before { opacity: 1; transform: scale(1) rotate(0deg); }

        .card-img-wrapper { height: 380px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover img { transform: scale(1.1); filter: brightness(0.9); }

        .card-info { padding: 20px; text-align: center; }
        /* ضمان تساوي طول الكروت مهما كان اسم المنتج */
        .card-info h3 { font-size: 1.1rem; margin-bottom: 10px; height: 3rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.5rem; display: block; margin-bottom: 15px; letter-spacing: 1px; }
        
        .btn-order { background: var(--black); color: var(--gold); border: 1px solid var(--gold); padding: 12px; width: 100%; display: inline-block; text-decoration: none; font-weight: 700; transition: 0.3s; box-sizing: border-box; }
        .btn-order:hover { background: var(--gold); color: var(--black); }

        /* Skeleton Loading */
        .skeleton-card { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; height: 480px; animation: loading-shimmer 1.5s infinite linear; }
        @keyframes loading-shimmer { to { background-position: -200% 0; } }

        /* Footer */
        footer { background: var(--black); padding: 40px 20px; text-align: center; border-top: 1px solid var(--gold); color: var(--gold); }
        .footer-socials { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .footer-socials a { color: var(--gold); font-size: 2rem; transition: 0.3s; text-decoration: none; }
        .footer-socials a:hover { transform: translateY(-5px); opacity: 0.8; }
        footer p { opacity: 0.7; font-size: 0.8rem; letter-spacing: 1px; }

        /* RTL & Animations */
        [dir="rtl"] { font-family: 'Amiri', serif; }
        [dir="rtl"] .hero h1 { letter-spacing: 2px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) { #products-grid { gap: 20px; } .card img { height: 320px; } }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <img src="logo.png" alt="" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">ECLATÉ</span>
    </div>
    <div class="nav-right">
        <button class="lang-btn" onclick="toggleLanguage()" id="lang-toggle">العربية</button>
        <div class="nav-socials">
            <a href="https://www.instagram.com/eclate_eg/" target="_blank" style="color: var(--gold); margin-left: 15px;"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</nav>

<section class="hero">
    <img src="logo.png" alt="" class="hero-logo" onerror="this.style.display='none'">
    <h1 id="hero-title">ECLATÉ</h1>
    <p id="hero-subtitle">Elegance That Suits You</p>
</section>

<div class="container">
    <div id="products-grid"></div>
</div>

<footer>
    <div class="footer-socials">
        <a href="https://wa.me/201011590702" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.tiktok.com/@eclate_eg" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.instagram.com/eclate_eg/" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
    <p id="footer-copy">© 2026 ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGP488InXYjOP4SbgDmeNgPapkgFyMpjWr0ShvACi56yOHNEY3VsdLP3tEHXuFXc3FRRjgaFb2QktM/pub?output=csv';
    let currentLang = 'en';

    const translations = {
        en: { subtitle: "Elegance That Suits You", order: "Order via WhatsApp", copy: "© 2026 ECLATÉ - CURATED LUXURY. ALL RIGHTS RESERVED", btn: "العربية", waMsg: "Hello Eclaté, I would like to order: " },
        ar: { subtitle: "أناقة تليق بكِ", order: "اطلب عبر واتساب", copy: "جميع الحقوق محفوظة لـ إيكلاتيه ٢٠٢٦ ©", btn: "English", waMsg: "أهلاً إيكلاتيه، أرغب في طلب: " }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        const htmlTag = document.getElementById('main-html');
        htmlTag.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        htmlTag.lang = currentLang;
        document.getElementById('hero-subtitle').innerText = translations[currentLang].subtitle;
        document.getElementById('footer-copy').innerText = translations[currentLang].copy;
        document.getElementById('lang-toggle').innerText = translations[currentLang].btn;
        loadData();
    }

    function showSkeletons() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '<div class="skeleton-card"></div>'.repeat(6);
    }

    async function loadData() {
        try {
            showSkeletons();
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            
            // تقسيم متطور يتجاهل الأسطر الفارغة ويعالج الفواصل داخل النصوص
            const rows = csvData.split(/\r?\n/).slice(1).filter(r => r.trim().length > 10);
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            rows.forEach((row, index) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 4) {
                    const name = cols[1].replace(/"/g, '').trim();
                    const price = cols[2].replace(/"/g, '').trim();
                    const img = cols[3].replace(/"/g, '').trim();
                    
                    // رسالة واتساب غنية بالتفاصيل لتسهيل البيع
                    const waLink = `https://wa.me/201011590702?text=${encodeURIComponent(translations[currentLang].waMsg + name + " - Price: " + price + " EGP")}`;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.1}s`; 
                    card.innerHTML = `
                        <div class="card-img-wrapper">
                            <img src="${img}" alt="${name}" onerror="this.src='https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=1000'">
                        </div>
                        <div class="card-info">
                            <h3>${name}</h3>
                            <span class="price">${price} EGP</span>
                            <a href="${waLink}" target="_blank" class="btn-order">${translations[currentLang].order}</a>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        } catch (e) { 
            console.error("Fetch error");
            document.getElementById('products-grid').innerHTML = '<p style="color:var(--gold); grid-column:1/-1; text-align:center;">Failed to load collection. Please try again later.</p>';
        }
    }
    loadData();
</script>
</body>
</html>
